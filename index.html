<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Southern Crawlspace Solutions</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1a2b;
      color: white;
    }

    header {
      background: #06121f;
      padding: 20px;
      text-align: center;
      border-bottom: 3px solid #1f6fff;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #111f33;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    h2 {
      color: #1f6fff;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #1f6fff;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>Southern Crawlspace Solutions</h1>
  <p>Call/Text: 336-894-8234</p>
</header>

<div class="container">

  <div class="card">
    <h2>Services</h2>
    <p>Crawlspace Encapsulation</p>
    <p>Moisture & Mold Control</p>
    <p>Insulation & Vapor Barriers</p>
    <p>Pressure Washing</p>
  </div>

  <div class="card">
    <h2>Request Quote</h2>

    <form>
      <input type="text" placeholder="Name" required>
      <input type="tel" placeholder="Phone" required>
      <input type="email" placeholder="Email" required>
      <textarea placeholder="Project details"></textarea>
      <button type="submit">Send</button>
    </form>
  </div>

</div>

</body>
</html>
