<script>
function calculateEstimate(){

let phone = document.getElementById('phone').value;
let size = Number(document.getElementById('size').value);
let problem = Number(document.getElementById('problem').value);
let service = Number(document.getElementById('service').value);

if(!phone || phone.length < 7){
alert("Enter phone number first");
return;
}

if(!size || size <= 0){
alert("Enter square footage");
return;
}

let base = size * 1.6;

if(problem === 2) base *= 1.4;
if(problem === 3) base *= 1.8;

if(service === 2) base *= 2.2;
if(service === 3) base *= 3;

let low = Math.round(base * 0.75);
let mid = Math.round(base);
let high = Math.round(base * 1.35);

let estimateText =
"Low: $" + low + " | Mid: $" + mid + " | High: $" + high;

document.getElementById("estimateResult").style.display = "block";
document.getElementById("estimateResult").innerHTML =
"<b>Your Estimate:</b><br><br>" + estimateText;

/* ✅ SEND EMAIL LEAD (FIXED FORMSPREE) */
fetch("https://formspree.io/f/xnjodvpz", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
phone: phone,
square_feet: size,
problem: problem,
service: service,
estimate: estimateText
})
});

}
</script>
